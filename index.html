<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Zombie Shooter Fix</title>

<style>
body{
  margin:0;
  background:#0a0a0a;
  color:white;
  font-family:sans-serif;
  overflow:hidden;
}

/* CANVAS */
canvas{
  position:fixed;
  top:0;
  left:0;
}

/* UI */
#ui{
  position:fixed;
  bottom:10px;
  width:100%;
  display:flex;
  justify-content:center;
  gap:10px;
}

.btn{
  background:#ff2e2e;
  padding:12px;
  border:none;
  border-radius:10px;
  color:white;
}

/* PANEL */
.panel{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:90%;
  max-width:400px;
  background:#111;
  border-radius:15px;
  padding:15px;
  display:none;
}

/* CARD */
.card{
  background:#1a1a1a;
  padding:10px;
  margin:10px 0;
  border-radius:10px;
}

/* SUCCESS */
.success{
  background:green !important;
}

/* JOYSTICK */
.joystick{
  position:fixed;
  bottom:80px;
  left:20px;
  width:120px;
  height:120px;
  border-radius:50%;
  background:#222;
}

.stick{
  width:40px;
  height:40px;
  background:#ff2e2e;
  border-radius:50%;
  position:absolute;
  top:40px;
  left:40px;
}

/* SHOOT BUTTON */
#shootBtn{
  position:fixed;
  bottom:100px;
  right:20px;
  padding:20px;
  border-radius:50%;
  background:red;
}

/* POPUP */
#popup{
  position:fixed;
  top:20%;
  left:50%;
  transform:translateX(-50%);
  background:#000;
  padding:15px;
  border-radius:10px;
  display:none;
}
</style>
</head>

<body>

<canvas id="game"></canvas>

<div id="popup"></div>

<!-- UI -->
<div id="ui">
  <button class="btn" onclick="openPanel('weapon')">🔫</button>
  <button class="btn" onclick="openPanel('shop')">💳</button>
  <button class="btn" onclick="openPanel('user')">👤</button>
</div>

<!-- JOYSTICK -->
<div class="joystick" id="joy">
  <div class="stick" id="stick"></div>
</div>

<!-- SHOOT BUTTON -->
<button id="shootBtn" onclick="shoot()">🔥</button>

<!-- WEAPON -->
<div id="weapon" class="panel">
<h2>Senjata</h2>
<div id="weaponList"></div>
<button class="btn" onclick="closePanel()">Tutup</button>
</div>

<!-- SHOP -->
<div id="shop" class="panel">
<h2>Convert</h2>
<div class="card">
<button class="btn" onclick="convert(3000,10000)">3000 → 10K</button>
<button class="btn" onclick="convert(8000,50000)">8000 → 50K</button>
<button class="btn" onclick="convert(15000,500000)">15000 → 500K</button>
</div>
<p>Saldo anda sekarang: <span id="saldo">0</span></p>
<button class="btn" onclick="closePanel()">Tutup</button>
</div>

<!-- USER -->
<div id="user" class="panel">
<h2>User</h2>
<p>ID: <span id="uid"></span></p>
<p>Coin anda sekarang: <span id="coinText">0</span></p>

<div id="adminPanel">
  <h3>Admin</h3>
  <input id="addCoin" placeholder="Tambah coin">
  <button class="btn" onclick="addCoin()">Tambah</button>
</div>

<button class="btn" onclick="closePanel()">Tutup</button>
</div>

<script>
// ===== CANVAS =====
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

function resize(){
 canvas.width=innerWidth;
 canvas.height=innerHeight;
}
resize();
window.addEventListener("resize",resize);

// ===== DATA =====
let coins=0,balance=0;
let userId=Math.floor(Math.random()*999999);
document.getElementById("uid").innerText=userId;

// ===== PLAYER =====
let player={x:200,y:200};

// ===== JOYSTICK =====
let move={x:0,y:0};
const joy=document.getElementById("joy");
const stick=document.getElementById("stick");

joy.addEventListener("touchmove",e=>{
 let t=e.touches[0];
 let rect=joy.getBoundingClientRect();
 let x=t.clientX-rect.left-60;
 let y=t.clientY-rect.top-60;

 stick.style.left=(x+40)+"px";
 stick.style.top=(y+40)+"px";

 move.x=x/40;
 move.y=y/40;
});

joy.addEventListener("touchend",()=>{
 stick.style.left="40px";
 stick.style.top="40px";
 move.x=0;move.y=0;
});

// ===== WEAPON =====
let weapons=[
 {name:"Pistol",price:100,damage:10},
 {name:"SMG",price:250,damage:8},
 {name:"Shotgun",price:300,damage:25}
];

let currentWeapon=0;

function renderWeapons(){
 let html="";
 weapons.forEach((w,i)=>{
  html+=`
  <div class="card" id="w${i}">
   ${w.name}<br>
   <button class="btn" onclick="buyWeapon(${i})">${w.price}</button>
  </div>`;
 });
 document.getElementById("weaponList").innerHTML=html;
}
renderWeapons();

function buyWeapon(i){
 if(coins>=weapons[i].price){
  coins-=weapons[i].price;
  currentWeapon=i;
  let el=document.getElementById("w"+i);
  el.classList.add("success");
  el.innerHTML+="<p>Buy Successful</p>";
 }
}

// ===== SHOOT =====
let bullets=[];
function shoot(){
 bullets.push({x:player.x,y:player.y,dx:8,dy:0,dmg:weapons[currentWeapon].damage});
}

// ===== ZOMBIE =====
let zombies=[];
function spawnZombie(){
 zombies.push({x:canvas.width,y:Math.random()*canvas.height,hp:30});
}

// ===== POPUP =====
function showPopup(text){
 let p=document.getElementById("popup");
 p.innerText=text;
 p.style.display="block";
 setTimeout(()=>p.style.display="none",1500);
}

// ===== LOOP =====
function loop(){
 ctx.clearRect(0,0,canvas.width,canvas.height);

 player.x+=move.x*3;
 player.y+=move.y*3;

 // player
 ctx.beginPath();
 ctx.arc(player.x,player.y,15,0,Math.PI*2);
 ctx.fill();

 // bullets
 bullets.forEach((b,i)=>{
  b.x+=b.dx;
  ctx.fillRect(b.x,b.y,5,5);
 });

 // zombies
 zombies.forEach((z,zi)=>{
  z.x-=1;
  ctx.beginPath();
  ctx.arc(z.x,z.y,15,0,Math.PI*2);
  ctx.fill();

  bullets.forEach((b,bi)=>{
    let dist=Math.hypot(b.x-z.x,b.y-z.y);
    if(dist<15){
      z.hp-=b.dmg;
      bullets.splice(bi,1);
    }
  });

  if(z.hp<=0){
    coins+=5;
    showPopup("Anda mendapatkan 5 coin, semangat!");
    zombies.splice(zi,1);
  }
 });

 document.getElementById("coinText").innerText=coins;

 requestAnimationFrame(loop);
}
loop();

setInterval(spawnZombie,2000);

// ===== SHOP =====
function convert(c,m){
 if(coins>=c){
  coins-=c;
  balance+=m;
  document.getElementById("saldo").innerText=balance.toLocaleString();
 }
}

// ===== ADMIN =====
function addCoin(){
 let val=parseInt(document.getElementById("addCoin").value);
 coins+=val;
}

// ===== PANEL =====
function openPanel(id){
 document.getElementById(id).style.display="block";
}
function closePanel(){
 document.querySelectorAll(".panel").forEach(p=>p.style.display="none");
}

// BLOCK SCROLL
document.body.addEventListener("touchmove",e=>e.preventDefault(),{passive:false});
</script>

</body>
</html>
