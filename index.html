<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Zombie Shooter Santai</title>
<style>
body {
  margin:0;
  background:#0f172a;
  color:white;
  font-family:sans-serif;
  text-align:center;
}

#menu button {
  padding:10px;
  margin:5px;
  border:none;
  background:#22c55e;
  color:black;
  cursor:pointer;
  border-radius:8px;
}

canvas {
  background:black;
  border:2px solid white;
  margin-top:10px;
}

.panel {
  display:none;
}

input {
  padding:8px;
  margin:5px;
  border-radius:6px;
  border:none;
}

button {
  cursor:pointer;
}

.shop button {
  display:block;
  margin:10px auto;
  padding:10px;
}
</style>
</head>
<body>

<h1>🧟 Zombie Shooter Santai</h1>

<div id="menu">
  <button onclick="showMenu('game')">🎮 Game</button>
  <button onclick="showMenu('shop')">💳 Shop</button>
  <button onclick="showMenu('user')">👤 User</button>
</div>

<!-- GAME -->
<div id="game" class="panel">
  <h3>Coins: <span id="coins">0</span> | Wave: <span id="wave">1</span></h3>
  <h4>Weapon Level: <span id="weapon">1</span></h4>

  <button onclick="upgradeWeapon()">Upgrade Senjata</button>

  <canvas id="canvas" width="800" height="400"></canvas>
</div>

<!-- SHOP -->
<div id="shop" class="panel shop">
  <h2>💳 Convert (SIMULASI)</h2>
  <p>⚠️ Ini hanya saldo game, tidak bisa ditarik</p>

  <button onclick="convert(3000,10000)">3000 → 10.000</button>
  <button onclick="convert(8000,50000)">8000 → 50.000</button>
  <button onclick="convert(15000,500000)">15000 → 500.000</button>

  <h3>Saldo Game: <span id="balance">0</span></h3>
</div>

<!-- USER -->
<div id="user" class="panel">
  <h3>User ID: <span id="uid"></span></h3>

  <h3>Admin Panel (Local)</h3>
  <input id="targetId" placeholder="User ID">
  <input id="addCoin" placeholder="Tambah coin">
  <button onclick="adminAddCoin()">Tambah</button>
</div>

<script>
// ================== DATA ==================
let coins = 0;
let balance = 0;
let wave = 1;
let weaponLevel = 1;

let weaponStats = [
  {price:100, damage:10, fireRate:400},
  {price:250, damage:15, fireRate:300},
  {price:300, damage:20, fireRate:250},
  {price:500, damage:30, fireRate:200},
  {price:750, damage:45, fireRate:150}
];

let userId = Math.floor(Math.random()*999999);
document.getElementById("uid").innerText = userId;

// ================== CANVAS ==================
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let bullets = [];
let zombies = [];
let lastShot = 0;

// ================== SOUND ==================
function playShoot(){
  let audio = new Audio();
  audio.src = "data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQAAAAA=";
  audio.play();
}

// ================== SHOOT ==================
canvas.addEventListener("click", ()=>{
  let now = Date.now();
  let weapon = weaponStats[weaponLevel-1];

  if (now - lastShot > weapon.fireRate){
    bullets.push({x:50,y:200,speed:6,damage:weapon.damage});
    playShoot();
    lastShot = now;
  }
});

// ================== SPAWN ==================
function spawnZombie(){
  zombies.push({
    x:800,
    y:Math.random()*350,
    hp:20 + wave*5,
    boss:false
  });
}

function spawnBoss(){
  zombies.push({
    x:800,
    y:150,
    hp:200 + wave*20,
    boss:true
  });
}

// ================== LOOP ==================
function loop(){
  ctx.clearRect(0,0,800,400);

  // bullets
  bullets.forEach((b,i)=>{
    b.x += b.speed;
    ctx.fillStyle="yellow";
    ctx.fillRect(b.x,b.y,5,5);
  });

  // zombies
  zombies.forEach((z,zi)=>{
    z.x -= z.boss ? 0.5 : 1;

    ctx.fillStyle = z.boss ? "red" : "green";
    ctx.fillRect(z.x,z.y,20,20);

    bullets.forEach((b,bi)=>{
      if (b.x > z.x && b.x < z.x+20 && b.y > z.y && b.y < z.y+20){
        z.hp -= b.damage;
        bullets.splice(bi,1);
      }
    });

    if (z.hp <= 0){
      coins += z.boss ? 50 : 5;
      zombies.splice(zi,1);
    }
  });

  document.getElementById("coins").innerText = coins;
  document.getElementById("wave").innerText = wave;
  document.getElementById("weapon").innerText = weaponLevel;

  requestAnimationFrame(loop);
}

setInterval(()=>{
  spawnZombie();
  if (wave % 5 === 0) spawnBoss();
  wave++;
},3000);

loop();

// ================== UPGRADE ==================
function upgradeWeapon(){
  if (weaponLevel >= weaponStats.length) return alert("Max!");

  let next = weaponStats[weaponLevel];

  if (coins >= next.price){
    coins -= next.price;
    weaponLevel++;
  } else {
    alert("Coin kurang!");
  }
}

// ================== CONVERT ==================
function convert(c,m){
  if (coins >= c){
    coins -= c;
    balance += m;
    document.getElementById("balance").innerText = balance;
  } else {
    alert("Coin kurang!");
  }
}

// ================== ADMIN ==================
function adminAddCoin(){
  let target = document.getElementById("targetId").value;
  let amount = parseInt(document.getElementById("addCoin").value);

  if (parseInt(target) === userId){
    coins += amount;
    alert("Berhasil!");
  } else {
    alert("ID tidak cocok (demo local)");
  }
}

// ================== MENU ==================
function showMenu(m){
  document.querySelectorAll(".panel").forEach(p=>p.style.display="none");
  document.getElementById(m).style.display="block";
}

// default
showMenu("game");

</script>

</body>
</html>
