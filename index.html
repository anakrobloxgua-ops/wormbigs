<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="vAI - Asisten AI Indonesia. Generate kode HTML CSS JS, coding helper, prompt engineering, machine learning, web development, dan semua hal tech.">
    <title>vAI - Asisten AI Serba Bisa</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap');
        
        :root {
            --bg: #0a0a0f;
            --surface: #11111f;
            --accent: #00ffea;
            --text: #e0e0ff;
        }
        
        [data-theme="light"] {
            --bg: #f8f9ff;
            --surface: #ffffff;
            --accent: #0066cc;
            --text: #1a1a2e;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            height: 100dvh;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
        }
        
        .app { height: 100dvh; display: flex; flex-direction: column; }
        
        .header {
            padding: 16px 20px;
            background: linear-gradient(to right, #1a0033, #2a0055);
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: white;
            z-index: 10;
        }
        
        .logo {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2.3rem;
            font-weight: 700;
            background: linear-gradient(90deg, var(--accent), #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .header-buttons button {
            background: none;
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            font-size: 1.3rem;
            cursor: pointer;
            margin-left: 8px;
        }
        
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--surface);
            overflow: hidden;
        }
        
        .chat-box {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
            background: var(--bg);
        }
        
        .message {
            max-width: 90%;
            padding: 15px 20px;
            border-radius: 20px;
            line-height: 1.55;
            animation: fadeIn 0.3s ease;
        }
        
        .user { 
            align-self: flex-end; 
            background: var(--accent); 
            color: #000; 
        }
        
        .ai { 
            align-self: flex-start; 
            background: #3a1f6b; 
        }
        
        pre {
            background: #0a0a1f;
            padding: 16px;
            border-radius: 12px;
            overflow-x: auto;
            margin: 12px 0;
            font-size: 0.95rem;
        }
        
        .copy-btn {
            margin-top: 8px;
            padding: 8px 16px;
            background: #00ffea;
            color: #000;
            border: none;
            border-radius: 20px;
            cursor: pointer;
        }
        
        /* Loading Animation */
        .typing-indicator {
            align-self: flex-start;
            background: #3a1f6b;
            padding: 12px 20px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .typing-dot {
            width: 8px;
            height: 8px;
            background: #aaa;
            border-radius: 50%;
            animation: typingBounce 1.2s infinite ease-in-out;
        }
        
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes typingBounce {
            0%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-6px); }
        }
        
        .input-area {
            padding: 16px 20px;
            background: var(--surface);
            border-top: 1px solid rgba(255,255,255,0.1);
            display: flex;
            gap: 12px;
        }
        
        input {
            flex: 1;
            padding: 16px 22px;
            border: none;
            border-radius: 50px;
            background: #2a2a4a;
            color: var(--text);
            font-size: 1.05rem;
        }
        
        button.send-btn {
            padding: 16px 28px;
            background: linear-gradient(var(--accent), #00ccbb);
            color: #000;
            border: none;
            border-radius: 50px;
            font-weight: 700;
            cursor: pointer;
        }
        
        .quick-prompts {
            padding: 12px 20px;
            background: var(--surface);
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        
        .quick-btn {
            background: rgba(255,255,255,0.08);
            border: 1px solid var(--accent);
            color: var(--text);
            padding: 10px 16px;
            border-radius: 30px;
            font-size: 0.92rem;
            cursor: pointer;
        }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
    </style>
</head>
<body data-theme="dark">
    <div class="app">
        <div class="header">
            <div class="logo">vAI</div>
            <div class="header-buttons">
                <button id="newChat">New Chat</button>
                <button id="themeToggle">☀️</button>
                <button id="clearHistory">🗑️</button>
            </div>
        </div>
        
        <div class="chat-container">
            <div class="chat-box" id="chatBox"></div>
            
            <div class="quick-prompts">
                <button class="quick-btn" onclick="quickPrompt('Buatkan landing page portfolio modern')">Portfolio</button>
                <button class="quick-btn" onclick="quickPrompt('Buatkan todo list lengkap dengan HTML CSS JS')">Todo List</button>
                <button class="quick-btn" onclick="quickPrompt('Buatkan form login dengan animasi')">Form Login</button>
                <button class="quick-btn" onclick="quickPrompt('Buatkan kalkulator sederhana')">Kalkulator</button>
            </div>
            
            <div class="input-area">
                <input type="text" id="userInput" placeholder="Ketik apa saja... (contoh: buatkan website toko online)">
                <button class="send-btn" onclick="sendMessage()">Kirim</button>
            </div>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById('chatBox');
        let history = JSON.parse(localStorage.getItem('vAIHistory')) || [];
        
        function loadHistory() {
            chatBox.innerHTML = '';
            history.forEach(msg => addMessage(msg.text, msg.type, false));
        }
        
        function saveHistory() {
            localStorage.setItem('vAIHistory', JSON.stringify(history));
        }
        
        function addMessage(text, type, save = true) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${type}`;
            msgDiv.innerHTML = text;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
            
            if (save) {
                history.push({text, type});
                if (history.length > 80) history.shift();
                saveHistory();
            }
        }
        
        function showTypingIndicator() {
            const typing = document.createElement('div');
            typing.className = 'typing-indicator';
            typing.id = 'typingIndicator';
            typing.innerHTML = `
                <span>vAI sedang mengetik</span>
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
            `;
            chatBox.appendChild(typing);
            chatBox.scrollTop = chatBox.scrollHeight;
            return typing;
        }
        
        function simulateAIResponse(userText) {
            const typing = showTypingIndicator();
            
            setTimeout(() => {
                chatBox.removeChild(typing);
                
                const lower = userText.toLowerCase();
                
                if (lower.includes("buatkan") || lower.includes("buat") || lower.includes("kode") || lower.includes("code") || 
                    lower.includes("html") || lower.includes("css") || lower.includes("js") || lower.includes("website")) {
                    
                    // Kode generator yang lebih baik
                    const codeExample = `<pre><code>/* vAI Generated - ${userText} */\n\n&lt;!DOCTYPE html&gt;\n&lt;html lang="id"&gt;\n&lt;head&gt;\n  &lt;meta charset="UTF-8"&gt;\n  &lt;title&gt;Contoh dari vAI&lt;/title&gt;\n  &lt;style&gt;\n    body { font-family: Arial; background: linear-gradient(#0a0a0f, #1a0033); color: white; padding: 40px; }\n  &lt;/style&gt;\n&lt;/head&gt;\n&lt;body&gt;\n  &lt;h1&gt;Halo dari vAI! 👋&lt;/h1&gt;\n  &lt;script&gt;\n    console.log("Kode JS juga jalan!");\n  &lt;/script&gt;\n&lt;/body&gt;\n&lt;/html&gt;</code></pre>`;
                    
                    addMessage(`✅ Berikut kode lengkap HTML + CSS + JS yang aku buatkan sesuai permintaanmu:<br><br>${codeExample}<br><button class="copy-btn" onclick="navigator.clipboard.writeText(this.previousElementSibling.textContent)">📋 Copy Semua Kode</button><br><br>Mau aku tambah fitur, ubah warna, atau buat yang lebih advance?`, 'ai');
                } else {
                    const responses = [
                        "Mantap! 👋 Mau aku generate kode HTML, CSS, JS untuk apa?",
                        "Keren pertanyaannya! Aku siap bantu buat kode lengkap.",
                        "Oke, vAI coding mode aktif. Kasih detail lebih lanjut biar hasilnya pas.",
                        "Sip! Apa yang ingin kamu buat hari ini?"
                    ];
                    addMessage(responses[Math.floor(Math.random() * responses.length)], 'ai');
                }
            }, 1200 + Math.random() * 800); // Random delay biar lebih natural
        }
        
        function sendMessage() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text) return;
            
            addMessage(text, 'user');
            input.value = '';
            
            simulateAIResponse(text);
        }
        
        function quickPrompt(text) {
            addMessage(text, 'user');
            simulateAIResponse(text);
        }
        
        // New Chat
        document.getElementById('newChat').addEventListener('click', () => {
            if (confirm('Mulai chat baru? (Riwayat lama tetap tersimpan)')) {
                chatBox.innerHTML = '';
                addMessage(`Halo! 👋 Selamat datang kembali di <strong>vAI</strong>.<br><br>Aku bisa generate kode HTML, CSS, JavaScript lengkap untuk apa saja: landing page, aplikasi, form, game, dll.<br><br>Mau buat apa sekarang?`, 'ai', false);
            }
        });
        
        // Theme Toggle
        const themeToggle = document.getElementById('themeToggle');
        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('vAITheme', theme);
            themeToggle.textContent = theme === 'dark' ? '☀️' : '🌙';
        }
        
        themeToggle.addEventListener('click', () => {
            const current = document.documentElement.getAttribute('data-theme');
            setTheme(current === 'dark' ? 'light' : 'dark');
        });
        
        // Clear History
        document.getElementById('clearHistory').addEventListener('click', () => {
            if (confirm('Hapus semua riwayat chat?')) {
                history = [];
                localStorage.removeItem('vAIHistory');
                chatBox.innerHTML = '';
                addMessage('Riwayat dihapus.<br><br>Halo! 👋 Selamat datang di <strong>vAI</strong>. Mau generate kode apa hari ini?', 'ai', false);
            }
        });
        
        // Enter key
        document.getElementById('userInput').addEventListener('keypress', e => {
            if (e.key === 'Enter') sendMessage();
        });
        
        // Load awal
        window.onload = () => {
            const savedTheme = localStorage.getItem('vAITheme') || 'dark';
            setTheme(savedTheme);
            
            if (history.length === 0) {
                addMessage(`Halo! 👋 Selamat datang di <strong>vAI</strong>.<br><br>Aku asisten AI yang bisa langsung <strong>generate kode HTML + CSS + JS</strong> lengkap sesuai perintahmu.<br><br>Coba ketik: "buatkan landing page portfolio" atau pilih quick prompt di bawah.`, 'ai', false);
            } else {
                loadHistory();
            }
        };
    </script>
</body>
</html>
