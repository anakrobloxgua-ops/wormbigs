<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="vAI - Asisten AI Indonesia oleh Twguhvándéz. Bisa buat kode HTML CSS JS, coding helper, prompt engineering, machine learning, fullstack, debugging, web development, React, Tailwind, Python, API, generative AI, LLM, dan semua hal tech.">
    <title>vAI - Asisten AI Twguhvándéz</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap');
        
        :root {
            --bg: #0a0a0f;
            --surface: #1a1a2e;
            --accent: #00ffea;
            --text: #e0e0ff;
            --text-secondary: #b0b0ff;
        }
        
        [data-theme="light"] {
            --bg: #f8f9ff;
            --surface: #ffffff;
            --accent: #0066cc;
            --text: #1a1a2e;
            --text-secondary: #444466;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            transition: background 0.4s ease, color 0.4s ease;
        }
        .hero {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f0a1f, #1a0033);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
        }
        [data-theme="light"] .hero { background: linear-gradient(135deg, #e0f0ff, #c0d8ff); }
        
        .logo {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 5.8rem;
            font-weight: 700;
            background: linear-gradient(90deg, var(--accent), #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        h1 { font-size: 2.9rem; margin: 20px 0 15px; }
        .tagline { font-size: 1.35rem; max-width: 820px; margin: 0 auto; color: var(--text-secondary); }
        
        .controls {
            position: absolute;
            top: 30px;
            right: 30px;
            display: flex;
            gap: 12px;
            z-index: 100;
        }
        .theme-toggle, .clear-btn {
            padding: 12px 18px;
            background: rgba(255,255,255,0.1);
            border: 1px solid var(--accent);
            color: var(--text);
            border-radius: 50px;
            cursor: pointer;
            font-size: 1.1rem;
            transition: 0.3s;
        }
        .theme-toggle:hover, .clear-btn:hover { background: var(--accent); color: #000; }
        
        .chat-container {
            max-width: 860px;
            margin: 40px auto;
            background: var(--surface);
            border-radius: 28px;
            overflow: hidden;
            border: 2px solid var(--accent);
            box-shadow: 0 0 60px rgba(0, 255, 234, 0.25);
        }
        .chat-header {
            background: linear-gradient(to right, #1a0033, #2a0055);
            padding: 18px;
            text-align: center;
            font-weight: 600;
            font-size: 1.25rem;
            color: white;
        }
        .chat-box {
            height: 480px;
            padding: 25px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
            background: var(--bg);
        }
        .message {
            max-width: 88%;
            padding: 15px 22px;
            border-radius: 22px;
            line-height: 1.55;
            animation: fadeIn 0.4s ease;
        }
        .user { 
            align-self: flex-end; 
            background: var(--accent); 
            color: #000; 
            border-bottom-right-radius: 6px;
        }
        .ai { 
            align-self: flex-start; 
            background: #3a1f6b; 
            border-bottom-left-radius: 6px;
        }
        pre {
            background: #0a0a1f;
            padding: 16px;
            border-radius: 12px;
            overflow-x: auto;
            margin: 12px 0;
            font-size: 0.95rem;
        }
        .copy-btn {
            margin-top: 8px;
            padding: 6px 14px;
            background: #00ffea;
            color: #000;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9rem;
        }
        
        .input-area {
            padding: 22px;
            background: var(--surface);
            display: flex;
            gap: 12px;
        }
        input {
            flex: 1;
            padding: 16px 24px;
            border: none;
            border-radius: 50px;
            background: #2a2a4a;
            color: var(--text);
            font-size: 1.05rem;
        }
        button {
            padding: 16px 34px;
            background: linear-gradient(var(--accent), #00ccbb);
            color: #000;
            border: none;
            border-radius: 50px;
            font-weight: 700;
            cursor: pointer;
        }
        .quick-prompts {
            padding: 15px 0;
            text-align: center;
            background: var(--surface);
        }
        .quick-btn {
            background: rgba(255,255,255,0.08);
            border: 1px solid var(--accent);
            color: var(--text);
            padding: 9px 16px;
            margin: 6px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.95rem;
        }
    </style>
</head>
<body data-theme="dark">
    <section class="hero">
        <div class="controls">
            <button class="theme-toggle" id="themeToggle">☀️</button>
            <button class="clear-btn" id="clearHistory">🗑️ Clear History</button>
        </div>
        <div>
            <div class="logo">vAI</div>
            <h1>Hai Twguhvándéz! 👋</h1>
            <p class="tagline">
                Aku vAI, asisten AI pribadimu.<br>
                Bisa buat kode HTML CSS JS, jelasin coding, prompt engineering, machine learning, web development, dan apapun!
            </p>
        </div>
    </section>

    <div class="chat-container">
        <div class="chat-header">💬 Chat dengan vAI — Kode Generator Aktif</div>
        <div class="chat-box" id="chatBox"></div>
        
        <div class="quick-prompts">
            <button class="quick-btn" onclick="quickPrompt('Buatkan landing page portfolio untuk Twguhvándéz')">Portfolio</button>
            <button class="quick-btn" onclick="quickPrompt('Buatkan todo list dengan HTML CSS JS')">Todo List</button>
            <button class="quick-btn" onclick="quickPrompt('Buatkan form login modern')">Form Login</button>
            <button class="quick-btn" onclick="quickPrompt('Jelasin CSS Grid dengan contoh kode lengkap')">CSS Grid</button>
        </div>
        
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Ketik perintahmu... (contoh: buatkan website ecommerce sederhana)">
            <button onclick="sendMessage()">Kirim</button>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById('chatBox');
        let history = JSON.parse(localStorage.getItem('vAIHistory')) || [];
        
        function loadHistory() {
            chatBox.innerHTML = '';
            history.forEach(msg => {
                addMessage(msg.text, msg.type, false);
            });
        }
        
        function saveHistory() {
            localStorage.setItem('vAIHistory', JSON.stringify(history));
        }
        
        function addMessage(text, type, save = true) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${type}`;
            msgDiv.innerHTML = text;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
            
            if (save) {
                history.push({text, type});
                if (history.length > 50) history.shift();
                saveHistory();
            }
        }
        
        function simulateAIResponse(userText) {
            const lower = userText.toLowerCase();
            
            if (lower.includes("buatkan") || lower.includes("buat") || lower.includes("kode") || lower.includes("code") || lower.includes("html") || lower.includes("css") || lower.includes("js")) {
                // Kode generator mode
                let codeExample = `<pre><code>/* vAI generated code for: ${userText} */\n\n&lt;!DOCTYPE html&gt;\n&lt;html&gt;\n&lt;head&gt;\n  &lt;title&gt;Contoh dari vAI&lt;/title&gt;\n  &lt;style&gt;\n    body { background: linear-gradient(#0a0a0f, #1a0033); color: white; }\n  &lt;/style&gt;\n&lt;/head&gt;\n&lt;body&gt;\n  &lt;h1&gt;Halo Twguhvándéz! 👋&lt;/h1&gt;\n&lt;/body&gt;\n&lt;/html&gt;</code></pre>`;
                codeExample += `<button class="copy-btn" onclick="navigator.clipboard.writeText(this.previousElementSibling.textContent)">📋 Copy Code</button>`;
                
                addMessage(`Berikut kode yang aku buatkan sesuai permintaanmu:<br><br>${codeExample}<br><br>Kamu bisa copy langsung dan paste ke file .html baru. Mau aku modifikasi lagi?`, 'ai');
            } else {
                const responses = [
                    `Mantap Twguhvándéz! 🔥 Aku paham. Mau aku buatkan kode HTML CSS JS untuk itu?`,
                    `Keren pertanyaannya! Aku vAI siap generate kode lengkap untukmu.`,
                    `Sip! Ini vAI coding mode. Kasih detail lebih lanjut biar hasilnya pas banget.`,
                    `Oke, aku bisa buatkan kode sesuai keinginanmu. Mau versi dark mode, animasi, atau responsive?`
                ];
                addMessage(responses[Math.floor(Math.random() * responses.length)], 'ai');
            }
        }
        
        function sendMessage() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text) return;
            
            addMessage(text, 'user');
            input.value = '';
            
            // Simulate thinking
            setTimeout(() => {
                simulateAIResponse(text);
            }, 700);
        }
        
        function quickPrompt(text) {
            addMessage(text, 'user');
            setTimeout(() => {
                simulateAIResponse(text);
            }, 600);
        }
        
        // Theme Toggle
        const themeToggle = document.getElementById('themeToggle');
        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('vAITheme', theme);
            themeToggle.textContent = theme === 'dark' ? '☀️' : '🌙';
        }
        
        themeToggle.addEventListener('click', () => {
            const current = document.documentElement.getAttribute('data-theme');
            setTheme(current === 'dark' ? 'light' : 'dark');
        });
        
        // Load saved theme
        const savedTheme = localStorage.getItem('vAITheme') || 'dark';
        setTheme(savedTheme);
        
        // Clear History
        document.getElementById('clearHistory').addEventListener('click', () => {
            if (confirm('Hapus semua riwayat chat?')) {
                history = [];
                localStorage.removeItem('vAIHistory');
                chatBox.innerHTML = '';
                addMessage('Riwayat chat sudah dihapus. Halo lagi Twguhvándéz! 👋 Mau buat kode apa hari ini?', 'ai', false);
            }
        });
        
        // Enter key support
        document.getElementById('userInput').addEventListener('keypress', e => {
            if (e.key === 'Enter') sendMessage();
        });
        
        // Initial welcome
        window.onload = () => {
            if (history.length === 0) {
                addMessage(`Halo Twguhvándéz! 👋<br><br>Aku <strong>vAI</strong> siap bantu kamu. Mau buat kode HTML, CSS, JS, landing page, aplikasi mini, atau jelasin konsep programming? Ketik saja perintahnya!`, 'ai', false);
            } else {
                loadHistory();
            }
        };
    </script>
</body>
</html>
