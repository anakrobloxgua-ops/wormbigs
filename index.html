<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Zombie Shooter Pro</title>

<style>
body{
  margin:0;
  background:#0a0a0a;
  color:white;
  font-family:sans-serif;
  overflow:hidden;
}

/* CANVAS CENTER */
canvas{
  position:fixed;
  top:0;
  left:0;
}

/* UI BOTTOM */
#ui{
  position:fixed;
  bottom:10px;
  width:100%;
  display:flex;
  justify-content:center;
  gap:10px;
}

/* BUTTON */
.btn{
  background:#ff2e2e;
  padding:12px;
  border:none;
  border-radius:10px;
  color:white;
}

/* PANEL */
.panel{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:90%;
  max-width:400px;
  background:#111;
  border-radius:15px;
  padding:15px;
  display:none;
}

/* CARD */
.card{
  background:#1a1a1a;
  padding:10px;
  margin:10px 0;
  border-radius:10px;
}

/* SUCCESS */
.success{
  background:green !important;
}

/* JOYSTICK */
.joystick{
  position:fixed;
  bottom:80px;
  width:120px;
  height:120px;
  border-radius:50%;
  background:#222;
}

#leftJoy{ left:20px; }
#rightJoy{ right:20px; }

.stick{
  width:40px;
  height:40px;
  background:#ff2e2e;
  border-radius:50%;
  position:absolute;
  top:40px;
  left:40px;
}
</style>
</head>

<body>

<canvas id="game"></canvas>

<!-- UI -->
<div id="ui">
  <button class="btn" onclick="openPanel('weapon')">🔫</button>
  <button class="btn" onclick="openPanel('shop')">💳</button>
</div>

<!-- JOYSTICK -->
<div id="leftJoy" class="joystick"><div class="stick" id="stickL"></div></div>
<div id="rightJoy" class="joystick"><div class="stick" id="stickR"></div></div>

<!-- WEAPON -->
<div id="weapon" class="panel">
<h2>Senjata</h2>
<div id="weaponList"></div>
<button class="btn" onclick="closePanel()">Tutup</button>
</div>

<!-- SHOP -->
<div id="shop" class="panel">
<h2>Convert</h2>

<div class="card">
<button class="btn" onclick="convert(3000,10000)">3000 → 10K</button>
<button class="btn" onclick="convert(8000,50000)">8000 → 50K</button>
<button class="btn" onclick="convert(15000,500000)">15000 → 500K</button>
</div>

<p>Saldo anda sekarang: <span id="saldo">0</span></p>

<button class="btn" onclick="closePanel()">Tutup</button>
</div>

<script>
// ===== CANVAS =====
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

function resize(){
  canvas.width=innerWidth;
  canvas.height=innerHeight;
}
resize();
window.addEventListener("resize",resize);

// ===== PLAYER =====
let player={x:200,y:200,size:15};

// ===== JOYSTICK =====
let move={x:0,y:0};
let aim={x:0,y:0};

function setupJoystick(el,stick,cb){
  let rect;
  el.addEventListener("touchstart",e=>{
    rect=el.getBoundingClientRect();
  });

  el.addEventListener("touchmove",e=>{
    let t=e.touches[0];
    let x=t.clientX-rect.left-60;
    let y=t.clientY-rect.top-60;

    stick.style.left=(x+40)+"px";
    stick.style.top=(y+40)+"px";

    cb(x/40,y/40);
  });

  el.addEventListener("touchend",()=>{
    stick.style.left="40px";
    stick.style.top="40px";
    cb(0,0);
  });
}

setupJoystick(leftJoy,stickL,(x,y)=>{move.x=x;move.y=y;});
setupJoystick(rightJoy,stickR,(x,y)=>{aim.x=x;aim.y=y;});

// ===== DATA =====
let coins=0,balance=0;

// ===== WEAPON =====
let weapons=[
 {name:"Pistol",price:100,damage:10,rate:400},
 {name:"SMG",price:250,damage:8,rate:150},
 {name:"Shotgun",price:300,damage:25,rate:700},
 {name:"Laser",price:750,damage:40,rate:100}
];

let currentWeapon=0;
let lastShot=0;

// ===== RENDER WEAPON =====
function renderWeapons(){
 let html="";
 weapons.forEach((w,i)=>{
  html+=`
  <div class="card" id="w${i}">
   ${w.name} (DMG:${w.damage})<br>
   <button class="btn" onclick="buyWeapon(${i})">${w.price}</button>
  </div>`;
 });
 document.getElementById("weaponList").innerHTML=html;
}
renderWeapons();

function buyWeapon(i){
 if(coins>=weapons[i].price){
  coins-=weapons[i].price;
  currentWeapon=i;

  let el=document.getElementById("w"+i);
  el.classList.add("success");
  el.innerHTML+="<p>Buy Successful</p>";
 }
}

// ===== SHOOT =====
let bullets=[];

function shoot(){
 let now=Date.now();
 let w=weapons[currentWeapon];

 if(now-lastShot<w.rate)return;

 bullets.push({
  x:player.x,
  y:player.y,
  dx:aim.x*10,
  dy:aim.y*10,
  dmg:w.damage
 });

 lastShot=now;
}

// ===== ZOMBIE =====
let zombies=[];

function spawnZombie(){
 zombies.push({
  x:canvas.width,
  y:Math.random()*canvas.height,
  hp:30,
  boss:false
 });
}

// ===== LOOP =====
function loop(){
 ctx.clearRect(0,0,canvas.width,canvas.height);

 // move player
 player.x+=move.x*3;
 player.y+=move.y*3;

 // shoot
 if(aim.x!==0||aim.y!==0) shoot();

 // player (circle)
 ctx.fillStyle="white";
 ctx.beginPath();
 ctx.arc(player.x,player.y,15,0,Math.PI*2);
 ctx.fill();

 // bullets
 bullets.forEach((b,i)=>{
  b.x+=b.dx;
  b.y+=b.dy;
  ctx.fillStyle="yellow";
  ctx.beginPath();
  ctx.arc(b.x,b.y,4,0,Math.PI*2);
  ctx.fill();
 });

 // zombies (circle + mata)
 zombies.forEach((z,zi)=>{
  z.x-=1;

  ctx.fillStyle="green";
  ctx.beginPath();
  ctx.arc(z.x,z.y,15,0,Math.PI*2);
  ctx.fill();

  ctx.fillStyle="red";
  ctx.fillRect(z.x-5,z.y-5,4,4);

  bullets.forEach((b,bi)=>{
    let dist=Math.hypot(b.x-z.x,b.y-z.y);
    if(dist<15){
      z.hp-=b.dmg;
      bullets.splice(bi,1);
    }
  });

  if(z.hp<=0){
    coins+=5;
    zombies.splice(zi,1);
  }
 });

 requestAnimationFrame(loop);
}
loop();

setInterval(spawnZombie,2000);

// ===== SHOP =====
function convert(c,m){
 if(coins>=c){
  coins-=c;
  balance+=m;
  document.getElementById("saldo").innerText=balance.toLocaleString();
 }
}

// ===== PANEL =====
function openPanel(id){
 document.getElementById(id).style.display="block";
}
function closePanel(){
 document.querySelectorAll(".panel").forEach(p=>p.style.display="none");
}

// ===== BLOCK SCROLL =====
document.body.addEventListener("touchmove",e=>e.preventDefault(),{passive:false});
</script>

</body>
</html>
