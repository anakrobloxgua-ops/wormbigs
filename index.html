<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="vAI - Asisten AI Indonesia yang bisa generate kode HTML CSS JS sesuai permintaan dan ingat percakapan sebelumnya.">
    <title>vAI - Asisten AI Serba Bisa</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap');
        
        :root {
            --bg: #0a0a0f;
            --surface: #11111f;
            --accent: #00ffea;
            --text: #e0e0ff;
        }
        
        [data-theme="light"] {
            --bg: #f8f9ff;
            --surface: #ffffff;
            --accent: #0066cc;
            --text: #1a1a2e;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            height: 100dvh;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
        }
        
        .app { height: 100dvh; display: flex; flex-direction: column; }
        
        .header {
            padding: 16px 20px;
            background: linear-gradient(to right, #1a0033, #2a0055);
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: white;
        }
        
        .logo {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2.3rem;
            font-weight: 700;
            background: linear-gradient(90deg, var(--accent), #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .header-buttons button {
            background: none;
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            font-size: 1.35rem;
            cursor: pointer;
            margin-left: 8px;
            transition: all 0.3s;
        }
        
        .header-buttons button:hover {
            background: rgba(255,255,255,0.15);
            transform: scale(1.1);
        }
        
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--surface);
            overflow: hidden;
        }
        
        .chat-box {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 18px;
            background: var(--bg);
        }
        
        .message {
            max-width: 92%;
            padding: 16px 22px;
            border-radius: 22px;
            line-height: 1.6;
            animation: fadeIn 0.4s ease;
        }
        
        .user { 
            align-self: flex-end; 
            background: var(--accent); 
            color: #000; 
            border-bottom-right-radius: 8px;
        }
        
        .ai { 
            align-self: flex-start; 
            background: #3a1f6b; 
            border-bottom-left-radius: 8px;
        }
        
        pre {
            background: #0a0a1f;
            padding: 18px;
            border-radius: 14px;
            overflow-x: auto;
            margin: 12px 0;
            font-size: 0.96rem;
            position: relative;
        }
        
        .copy-btn {
            position: absolute;
            top: 12px;
            right: 12px;
            padding: 8px 16px;
            background: rgba(0, 255, 234, 0.9);
            color: #000;
            border: none;
            border-radius: 20px;
            font-size: 0.88rem;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        
        .copy-btn:hover {
            background: #00ffea;
            transform: translateY(-2px);
        }
        
        /* Typing Indicator */
        .typing-indicator {
            align-self: flex-start;
            background: #3a1f6b;
            padding: 14px 22px;
            border-radius: 22px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .typing-dot {
            width: 9px;
            height: 9px;
            background: #ccc;
            border-radius: 50%;
            animation: typingBounce 1.4s infinite ease-in-out;
        }
        
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes typingBounce {
            0%, 80%, 100% { transform: scale(1); }
            40% { transform: scale(0.6); }
        }
        
        .input-area {
            padding: 16px 20px;
            background: var(--surface);
            border-top: 1px solid rgba(255,255,255,0.1);
            display: flex;
            gap: 12px;
        }
        
        input {
            flex: 1;
            padding: 16px 24px;
            border: none;
            border-radius: 50px;
            background: #2a2a4a;
            color: var(--text);
            font-size: 1.05rem;
        }
        
        button.send-btn {
            padding: 16px 32px;
            background: linear-gradient(var(--accent), #00ccbb);
            color: #000;
            border: none;
            border-radius: 50px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }
        
        button.send-btn:hover {
            transform: scale(1.05);
        }
        
        .quick-prompts {
            padding: 12px 20px;
            background: var(--surface);
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        
        .quick-btn {
            background: rgba(255,255,255,0.08);
            border: 1px solid var(--accent);
            color: var(--text);
            padding: 10px 18px;
            border-radius: 30px;
            font-size: 0.93rem;
            cursor: pointer;
            transition: 0.3s;
        }
        
        .quick-btn:hover {
            background: var(--accent);
            color: #000;
        }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: none; } }
    </style>
</head>
<body data-theme="dark">
    <div class="app">
        <div class="header">
            <div class="logo">vAI</div>
            <div class="header-buttons">
                <button id="newChat" title="New Chat">New</button>
                <button id="themeToggle" title="Toggle Theme">☀️</button>
                <button id="clearHistory" title="Clear History">🗑️</button>
            </div>
        </div>
        
        <div class="chat-container">
            <div class="chat-box" id="chatBox"></div>
            
            <div class="quick-prompts">
                <button class="quick-btn" onclick="quickPrompt('Buatkan landing page portfolio modern untuk Twguhvándéz')">Portfolio Modern</button>
                <button class="quick-btn" onclick="quickPrompt('Buatkan todo list lengkap dengan fitur delete dan dark mode')">Todo List</button>
                <button class="quick-btn" onclick="quickPrompt('Buatkan form login elegan dengan animasi')">Form Login</button>
            </div>
            
            <div class="input-area">
                <input type="text" id="userInput" placeholder="Ketik perintahmu... (contoh: buatkan website toko online)">
                <button class="send-btn" onclick="sendMessage()">Kirim</button>
            </div>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById('chatBox');
        let conversationHistory = JSON.parse(localStorage.getItem('vAIConversation')) || [];
        
        function loadHistory() {
            chatBox.innerHTML = '';
            conversationHistory.forEach(msg => addMessage(msg.text, msg.type, false));
        }
        
        function saveHistory() {
            localStorage.setItem('vAIConversation', JSON.stringify(conversationHistory));
        }
        
        function addMessage(text, type, save = true) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${type}`;
            msgDiv.innerHTML = text;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
            
            if (save) {
                conversationHistory.push({text, type});
                if (conversationHistory.length > 100) conversationHistory.shift();
                saveHistory();
            }
        }
        
        function showTyping() {
            const typing = document.createElement('div');
            typing.className = 'typing-indicator';
            typing.id = 'typing';
            typing.innerHTML = `vAI sedang berpikir <span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>`;
            chatBox.appendChild(typing);
            chatBox.scrollTop = chatBox.scrollHeight;
            return typing;
        }
        
        function simulateAIResponse(userText) {
            const typing = showTyping();
            
            setTimeout(() => {
                chatBox.removeChild(typing);
                
                const lowerText = userText.toLowerCase();
                let responseText = '';
                
                // Cek apakah ada kode sebelumnya di history (untuk modifikasi)
                const hasPreviousCode = conversationHistory.some(msg => 
                    msg.type === 'ai' && msg.text.includes('<pre><code>')
                );
                
                if ((lowerText.includes("buatkan") || lowerText.includes("buat") || lowerText.includes("kode") || 
                     lowerText.includes("website") || lowerText.includes("html") || lowerText.includes("css") || lowerText.includes("js")) && !hasPreviousCode) {
                    
                    responseText = `Berikut kode HTML + CSS + JS yang aku buatkan khusus untuk "${userText}":<br><br>
                    <pre><code>/* vAI Custom Code - \( {userText} */\n\n&lt;!DOCTYPE html&gt;\n&lt;html lang="id"&gt;\n&lt;head&gt;\n  &lt;meta charset="UTF-8"&gt;\n  &lt;title&gt; \){userText}&lt;/title&gt;\n  &lt;style&gt;\n    body {\n      font-family: 'Segoe UI', sans-serif;\n      background: linear-gradient(135deg, #0a0a0f, #1a0033);\n      color: white;\n      padding: 40px;\n    }\n  &lt;/style&gt;\n&lt;/head&gt;\n&lt;body&gt;\n  &lt;h1&gt;Halo Twguhvándéz! 👋&lt;/h1&gt;\n  &lt;p&gt;Ini contoh kode custom dari vAI.&lt;/p&gt;\n&lt;/body&gt;\n&lt;/html&gt;</code></pre>
                    <button class="copy-btn" onclick="navigator.clipboard.writeText(this.previousElementSibling.textContent)">📋 Copy Kode</button>`;
                    
                } else if (hasPreviousCode && (lowerText.includes("ubah") || lowerText.includes("tambah") || lowerText.includes("kurang") || lowerText.includes("ganti") || lowerText.includes("warna") || lowerText.includes("color") || lowerText.includes("tombol"))) {
                    // Mode modifikasi kode (ingat konteks)
                    responseText = `Mengerti! Aku ingat kode sebelumnya.<br>Aku sudah modifikasi sesuai permintaanmu ("${userText}").<br><br>
                    Berikut versi terbaru:<br><br>
                    <pre><code>/* vAI Updated Code - Modifikasi: ${userText} */\n\n/* Kode sebelumnya + perubahan warna, tombol, dll sesuai request */</code></pre>
                    <button class="copy-btn" onclick="navigator.clipboard.writeText(this.previousElementSibling.textContent)">📋 Copy Kode Terbaru</button><br><br>
                    Mau ada perubahan lain?`;
                } else if (lowerText.includes("developer") || lowerText.includes("siapa yang buat") || lowerText.includes("siapa kamu")) {
                    responseText = `Aku adalah <strong>vAI</strong>, asisten AI yang dibuat oleh Twguhvándéz.<br>Aku dirancang khusus untuk membantu generate kode HTML, CSS, JS dan ingat seluruh percakapan kita.`;
                } else {
                    responseText = `Terima kasih atas feedbacknya! 👋 Aku sudah mengingat percakapan kita sebelumnya.<br><br>Ada yang ingin kamu ubah atau tambahkan di kode tadi? Atau mau aku buatkan sesuatu yang baru?`;
                }
                
                addMessage(responseText, 'ai');
            }, 1100 + Math.random() * 900);
        }
        
        function sendMessage() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text) return;
            
            addMessage(text, 'user');
            input.value = '';
            simulateAIResponse(text);
        }
        
        function quickPrompt(text) {
            addMessage(text, 'user');
            simulateAIResponse(text);
        }
        
        // New Chat
        document.getElementById('newChat').addEventListener('click', () => {
            if (confirm('Mulai percakapan baru? (History lama tetap tersimpan di memori)')) {
                chatBox.innerHTML = '';
                conversationHistory = [];
                localStorage.removeItem('vAIConversation');
                addMessage(`Halo! 👋 Selamat datang kembali di <strong>vAI</strong>.<br><br>Aku akan ingat semua percakapan kita di sesi ini. Mau buat kode HTML/CSS/JS apa hari ini?`, 'ai', false);
            }
        });
        
        // Theme
        const themeToggle = document.getElementById('themeToggle');
        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('vAITheme', theme);
            themeToggle.textContent = theme === 'dark' ? '☀️' : '🌙';
        }
        
        themeToggle.addEventListener('click', () => {
            const current = document.documentElement.getAttribute('data-theme');
            setTheme(current === 'dark' ? 'light' : 'dark');
        });
        
        // Clear History
        document.getElementById('clearHistory').addEventListener('click', () => {
            if (confirm('Hapus semua riwayat chat?')) {
                conversationHistory = [];
                localStorage.removeItem('vAIConversation');
                chatBox.innerHTML = '';
                addMessage('Riwayat dihapus.<br><br>Halo lagi! 👋 Mau aku buatkan kode apa sekarang?', 'ai', false);
            }
        });
        
        document.getElementById('userInput').addEventListener('keypress', e => {
            if (e.key === 'Enter') sendMessage();
        });
        
        window.onload = () => {
            const savedTheme = localStorage.getItem('vAITheme') || 'dark';
            setTheme(savedTheme);
            
            if (conversationHistory.length === 0) {
                addMessage(`Halo! 👋 Selamat datang di <strong>vAI</strong>.<br><br>Aku bisa buat kode HTML, CSS, JS sesuai keinginanmu dan akan **ingat** semua percakapan sebelumnya.<br><br>Coba ketik: "buatkan landing page portfolio"`, 'ai', false);
            } else {
                loadHistory();
            }
        };
    </script>
</body>
</html>
